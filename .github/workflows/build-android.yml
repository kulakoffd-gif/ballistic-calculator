name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:   # ручной запуск из UI GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 35
          build-tools: 35.0.0

      - name: Setup consistent debug keystore
        run: |
          mkdir -p ~/.android
          cp debug.keystore ~/.android/debug.keystore
          echo "Используется фиксированный debug-keystore из репозитория."

      - name: Install npm dependencies
        run: npm install

      - name: Add Android platform (if missing)
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Generate Android icons from assets/icon.png
        run: npx capacitor-assets generate --android --iconBackgroundColor '#0a0e14' --iconBackgroundColorDark '#0a0e14' || echo "asset generation failed, продолжаем"

      - name: Sync web → native
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: skyrange-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
