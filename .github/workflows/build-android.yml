name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:   # ручной запуск из UI GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 35
          build-tools: 35.0.0

      - name: Setup consistent debug keystore
        run: |
          mkdir -p ~/.android
          cp debug.keystore ~/.android/debug.keystore
          echo "Используется фиксированный debug-keystore из репозитория."

      - name: Install npm dependencies
        run: npm install

      - name: Add Android platform (if missing)
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Force debug signing with repo keystore
        run: |
          # Копируем keystore в проект, чтобы Gradle точно его нашёл.
          cp debug.keystore android/app/debug.keystore
          # Аппендим explicit signingConfig в build.gradle — он переопределит дефолт AGP.
          cat >> android/app/build.gradle <<'EOF'

          android {
              signingConfigs {
                  debug {
                      storeFile file('debug.keystore')
                      storePassword 'android'
                      keyAlias 'androiddebugkey'
                      keyPassword 'android'
                  }
              }
              buildTypes {
                  debug {
                      signingConfig signingConfigs.debug
                  }
              }
          }
          EOF
          echo "=== SHA keystore-а в repo ==="
          shasum -a 256 debug.keystore
          echo "=== build.gradle hvost ==="
          tail -20 android/app/build.gradle

      - name: Generate Android icons from assets/icon.png
        run: npx capacitor-assets generate --android --iconBackgroundColor '#0a0e14' --iconBackgroundColorDark '#0a0e14' || echo "asset generation failed, продолжаем"

      - name: Sync web → native
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Verify APK signature fingerprint
        run: |
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          BUILD_TOOLS=$(ls -d $ANDROID_SDK_ROOT/build-tools/* | sort | tail -1)
          "$BUILD_TOOLS/apksigner" verify --print-certs "$APK" | grep -E "SHA-256|Subject" || true
          echo "Подпись APK выше. Если она одинаковая между сборками — установится поверх без конфликта."

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: skyrange-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
