name: Deploy web (GitHub Pages)

# Публикует папку www/ как веб-версию на GitHub Pages при каждом push в main.
# Один раз нужно включить Pages: репозиторий → Settings → Pages → Source: GitHub Actions.

on:
  push:
    branches: [main, master]
    paths:
      - 'www/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Не отменять выполняющийся деплой; держим один в очереди.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload www/ artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'www'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
