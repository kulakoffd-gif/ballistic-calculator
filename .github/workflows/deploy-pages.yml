name: Deploy web (GitHub Pages)

# Публикует папку www/ как веб-версию на GitHub Pages при каждом push в main.
# Один раз нужно включить Pages: репозиторий → Settings → Pages → Source: GitHub Actions.

on:
  push:
    branches: [main, master]
    paths:
      - 'www/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Не отменять выполняющийся деплой; держим один в очереди.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Без версии в URL браузер может отдать app.js из HTTP-кэша (GH Pages
      # шлёт max-age=600) даже сразу после деплоя, и вкладку, открытую ДО
      # деплоя, SPA вообще никогда не перечитает (hash-роутинг не делает
      # новых запросов) — пользователь долго проверяет фикс на старом коде,
      # думая, что мы его не задеплоили. ?v=<sha> форсирует новый URL на
      # каждый деплой, чтобы кэш браузера/SW не мог его подсунуть.
      - name: Cache-bust local script/style URLs
        run: |
          cd www
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-8)
          for f in ballistics.js units.js storage.js devices.js yadisk.js backup.js app.js style.css; do
            sed -i "s#\"$f\"#\"$f?v=$SHA_SHORT\"#g" index.html
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload www/ artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'www'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
