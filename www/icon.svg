<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0a0e14"/>
  <!-- фоновый прицел -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#2a3445" stroke-width="3"/>
  <line x1="256" y1="40"  x2="256" y2="120" stroke="#2a3445" stroke-width="3"/>
  <line x1="256" y1="392" x2="256" y2="472" stroke="#2a3445" stroke-width="3"/>
  <line x1="40"  y1="256" x2="120" y2="256" stroke="#2a3445" stroke-width="3"/>
  <line x1="392" y1="256" x2="472" y2="256" stroke="#2a3445" stroke-width="3"/>
  <!-- траектория -->
  <path d="M 60 320 Q 250 100, 460 240" fill="none"
        stroke="#ffb072" stroke-width="3" stroke-dasharray="6 8" opacity="0.55"/>
  <!-- сама пуля под углом, наконечник вправо-вверх -->
  <g transform="translate(256 256) rotate(-22)">
    <!-- латунная гильза (хвост) -->
    <rect x="-150" y="-44" width="80" height="88" rx="6" fill="#7a4517"/>
    <rect x="-150" y="-44" width="80" height="14" fill="#a05a1c"/>
    <rect x="-150" y="30" width="80" height="14" fill="#a05a1c"/>
    <!-- корпус пули -->
    <path d="M -70 -44 L 60 -44 Q 130 -44 156 0 Q 130 44 60 44 L -70 44 Z" fill="#ff8b3d"/>
    <!-- блик -->
    <path d="M -60 -32 L 50 -32 Q 110 -32 132 -8 L 132 -16 Q 110 -40 50 -40 L -60 -40 Z" fill="#ffb072"/>
    <!-- canelure (поясок) -->
    <line x1="-30" y1="-44" x2="-30" y2="44" stroke="#b85a1c" stroke-width="3"/>
  </g>
</svg>
