<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0b0f14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BalisticNote Pro">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<title>BalisticNote Pro — баллистика и журнал релоадинга</title>
</head>
<body>
<header class="topbar" id="topbar">
  <button class="ico" id="btnBack" aria-label="Назад" hidden>‹</button>
  <div style="flex:1;min-width:0;">
    <h1 id="title">BalisticNote Pro</h1>
    <div class="sub" id="subtitle" hidden></div>
  </div>
  <button class="ico" id="btnMenu" aria-label="Меню">≡</button>
</header>

<div class="progress" id="progress" hidden><div style="width:0%"></div></div>

<nav id="drawer" class="drawer" hidden>
  <a href="#/">Главная</a>
  <a href="#/ranges">Полигоны</a>
  <a href="#/journal">Журнал (поиск)</a>
  <a href="#/calc">Быстрый калькулятор</a>
  <a href="#/mil-ranging">Мил-рейнджинг</a>
  <a href="#/moving-target">Движущаяся цель</a>
  <a href="#/weapons">Оружие</a>
  <a href="#/cartridges">Патроны</a>
  <a href="#/casepreps">Подготовка гильз</a>
  <a href="#/notes">Заметки</a>
  <a href="#/reticles">Сетки прицелов</a>
  <a href="#/stages">PRS стейджи</a>
  <a href="#/atmo-presets">Атмо-пресеты</a>
  <a href="#/compare">Сравнение релоадов</a>
  <a href="#/wez">WEZ Monte Carlo</a>
  <a href="#/group-analyzer">Анализ кучности</a>
  <a href="#/range-card">Range Card (печать)</a>
  <a href="#/drag-builder">Drag из DOPE</a>
  <a href="#/settings">Настройки</a>
</nav>

<main id="view"></main>

<script src="ballistics.js"></script>
<script src="storage.js"></script>
<script src="devices.js"></script>
<script src="yadisk.js"></script>
<script src="backup.js"></script>
<script src="app.js"></script>
<script>
// SW нужен только в web-режиме (PWA-фоллбэк). В нативном Capacitor — пропускаем.
if (!window.Capacitor?.isNativePlatform?.() && 'serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
</body>
</html>
