<script>
// Сносим старый service worker, который мешал обновлениям и кэшировал старьё.
// ВАЖНО: чистим ТОЛЬКО кэш оболочки (Cache Storage). База (IndexedDB) и
// настройки (localStorage) НЕ трогаются — данные полигонов/пуль/патронов целы.
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    const had = regs.length > 0;
    return Promise.all(regs.map(r => r.unregister()))
      .then(() => (window.caches ? caches.keys() : []))
      .then(keys => Promise.all((keys || []).map(k => caches.delete(k))))
      .then(() => { if (had) location.reload(); }); // один раз перезагрузимся на свежак
  }).catch(() => {});
}
</script>
